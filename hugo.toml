baseURL = "https://oddshop.work/"
title = "OddShop.Work"
paginate = 12
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  title = "OddShop.Work"
  description = "Python automation tools for developers. Download and run — no subscriptions, no fluff."
  keywords = ["python", "automation", "tools", "developer tools", "scripts"]
  author = "OddShop"
  images = ["/images/og-default.png"]
  DateFormat = "January 2, 2006"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = false
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Automation tools that actually work"
    Content = """
We build Python tools for developers and small businesses.
Download once, own it forever. No subscriptions. No accounts.
Browse the catalog below or grab our latest release.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/oddshopworks1"

  [[params.socialIcons]]
    name = "whop"
    url = "https://whop.com/oddshopworks"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "tools"
    name = "Tools"
    url = "/tools/"
    weight = 10
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 20
  [[menu.main]]
    identifier = "websites"
    name = "Web Services"
    url = "/websites/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

